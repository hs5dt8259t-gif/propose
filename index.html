<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>結袂の環 ― 鑑定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0807; --tt-top:#18100c; --tt-bot:#0d0907;
    --frame:#5a4326; --glow:rgba(175,96,37,.35);
    --head-top:#3a1d10; --head-bot:#1c0d07;
    --uniq:#c2682a; --uniq-l:#e8893a;
    --blue:#8a8cf0; --blue-v:#aab4ff; --sig:#b9a6ff;
    --txt:#cfcabf; --mute:#7d756a; --flavor:#b59a6b;
    --band:rgba(70,55,120,.12); --sep:#4a3c28;
    --hid-l:#d8b15a; --hid-t:#e7d4a6; --soul:#e0a64b;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ min-height:100%; }
  body{
    background:radial-gradient(900px 600px at 50% -8%, #1a130d 0%, var(--bg) 60%), var(--bg);
    color:var(--txt); font-family:"Cormorant Garamond","Noto Serif JP","Noto Serif SC",serif;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
    transition:background .8s ease;
  }
  /* light skin (finale + codex) */
  body.light{
    background:radial-gradient(800px 600px at 50% -5%, #fffdf6 0%, #f3ece0 55%, #efe6d6 100%), #f3ece0;
    color:#4a3a26;
  }
  .screen{ display:none; min-height:100vh; padding:26px 18px 60px;
    flex-direction:column; align-items:center; justify-content:center; gap:20px; }
  .screen.on{ display:flex; animation:fade .6s ease both; }
  .screen.tall{ justify-content:flex-start; padding-top:42px; }
  @keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
  @media (prefers-reduced-motion:reduce){ .screen.on{ animation:none; } }

  .center{ text-align:center; }
  .sys{ font-family:"Noto Serif JP",serif; color:var(--mute); font-size:14px; letter-spacing:.05em; line-height:2; }
  .sys b{ color:var(--uniq-l); font-weight:500; }

  /* buttons */
  .btn{ font-family:"Noto Serif JP",serif; font-size:16px; letter-spacing:.06em;
    color:#f2e6cf; background:linear-gradient(180deg,#3a2613,#23160c);
    border:1px solid #6b4e26; border-radius:8px; padding:13px 30px; cursor:pointer;
    box-shadow:0 0 16px var(--glow); transition:transform .12s, box-shadow .2s; }
  .btn:hover{ box-shadow:0 0 24px var(--glow); }
  .btn:active{ transform:translateY(1px); }
  .btn.glow{ animation:breathe 2.4s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{ box-shadow:0 0 14px var(--glow);} 50%{ box-shadow:0 0 30px rgba(224,166,75,.55);} }
  .next{ margin-top:8px; color:var(--mute); font-size:14px; letter-spacing:.18em;
    background:none; border:0; cursor:pointer; font-family:"Noto Serif JP",serif; padding:10px; }
  .next:hover{ color:var(--uniq-l); }

  /* skip */
  .skip{ position:fixed; top:12px; right:14px; z-index:30; color:#5a5145; font-size:12px;
    letter-spacing:.12em; background:none; border:0; cursor:pointer; font-family:"Noto Serif JP",serif;
    opacity:.5; transition:opacity .2s; }
  .skip:hover{ opacity:1; color:var(--uniq); }
  body.light .skip{ color:#b3a489; }

  /* ===== tooltip ===== */
  .tooltip{ width:min(380px,94vw);
    background:linear-gradient(180deg,var(--tt-top),var(--tt-bot));
    border:1px solid var(--frame);
    box-shadow:0 0 0 1px #000 inset, 0 0 26px var(--glow), 0 16px 44px rgba(0,0,0,.6);
    position:relative; padding-bottom:14px; }
  .tooltip::before,.tooltip::after{ content:""; position:absolute; width:11px; height:11px;
    border-color:var(--uniq); border-style:solid; pointer-events:none; }
  .tooltip::before{ top:-1px; left:-1px; border-width:1px 0 0 1px; }
  .tooltip::after{ top:-1px; right:-1px; border-width:1px 1px 0 0; }
  body.light .tooltip{ background:linear-gradient(180deg,#fffdf8,#f6efe1);
    border-color:#d8c08a; box-shadow:0 0 0 1px #fff inset, 0 0 26px rgba(214,160,40,.25), 0 16px 40px rgba(120,90,40,.18); }
  body.light .tooltip::before,body.light .tooltip::after{ border-color:#bb8e2a; }

  .icon-wrap{ display:flex; justify-content:center; padding:16px 0 4px; }
  .icon{ width:128px; height:128px; position:relative; border:1px solid #4a3a22;
    background:radial-gradient(circle at 50% 42%, #2a1d12, #0c0907); box-shadow:inset 0 0 22px rgba(0,0,0,.72); }
  body.light .icon{ border:1px solid #e0cd9a; background:radial-gradient(circle at 50% 40%, #fffef9, #efe3cc); box-shadow:inset 0 0 20px rgba(150,120,60,.18); }
  .icon::after{ content:""; position:absolute; inset:0; box-shadow:inset 0 0 0 1px rgba(180,140,70,.18); }
  .icon img{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; padding:9px;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,.55)); }

  .head{ background:linear-gradient(180deg,var(--head-top),var(--head-bot));
    border-top:1px solid #000; border-bottom:1px solid #000; box-shadow:inset 0 0 28px rgba(0,0,0,.55);
    padding:10px 16px 12px; text-align:center; }
  body.light .head{ background:linear-gradient(180deg,#f6e7c8,#efdcb6); border-color:#e7d3a0; box-shadow:inset 0 0 22px rgba(200,160,90,.2); }
  .titlerow{ display:flex; align-items:center; justify-content:center; gap:13px; }
  .vol{ width:46px; height:28px; flex:none; opacity:.95; }
  .vol.r{ transform:scaleX(-1); }
  .vol path{ fill:none; stroke:var(--uniq); stroke-width:1.6; stroke-linecap:round; }
  .vol circle{ fill:none; stroke:var(--uniq); stroke-width:1.6; }
  .vol .hi{ stroke:var(--uniq-l); stroke-width:.8; opacity:.7; }
  .vol .dot{ fill:var(--uniq-l); stroke:none; }
  body.light .vol path,body.light .vol circle{ stroke:#bb8e2a; }
  body.light .vol .dot{ fill:#c89a30; }
  .name{ font-size:23px; font-weight:600; color:var(--uniq-l); text-shadow:0 1px 2px #000; line-height:1.12; }
  body.light .name{ color:#9c6a1e; text-shadow:none; }
  .name ruby rt{ font-size:.42em; color:var(--uniq); font-weight:500; letter-spacing:.16em; }
  body.light .name ruby rt{ color:#bb8e2a; }
  .base{ font-size:16px; color:var(--uniq); margin-top:2px; text-shadow:0 1px 2px #000; }
  body.light .base{ color:#b07c20; text-shadow:none; }

  .ttbody{ padding:12px 18px 0; text-align:center; }
  .row{ font-size:16px; line-height:1.5; }
  .req{ color:var(--mute); font-size:14.5px; } .req b{ color:var(--txt); font-weight:500; }
  body.light .req{ color:#8a795c; } body.light .req b{ color:#5a4a30; }
  .mod{ color:var(--blue); } .mod .v{ color:var(--blue-v); } .mod.sig{ color:var(--sig); }
  body.light .mod{ color:#5b62c8; } body.light .mod .v{ color:#3f47b8; } body.light .mod.sig{ color:#7a55c0; }
  .implicit{ background:var(--band); margin:0 -18px; padding:7px 18px; }
  .flavor{ color:var(--flavor); font-style:italic; font-size:15px; line-height:1.55; padding:2px; }
  body.light .flavor{ color:#9a7b3e; }
  .sep{ height:14px; margin:9px 0; display:flex; align-items:center; justify-content:center; gap:8px; }
  .sep i{ height:1px; flex:1; background:linear-gradient(90deg,transparent,var(--sep) 35%,var(--sep) 65%,transparent); }
  .sep b{ width:5px; height:5px; transform:rotate(45deg); background:var(--uniq); box-shadow:0 0 5px var(--glow); }
  .stack>*+*{ margin-top:2px; }

  /* hidden affixes inside tooltip (codex) */
  .haffix{ margin:6px 0; }
  .haffix .hl{ color:var(--hid-l); font-size:13.5px; }
  .haffix .ht{ color:var(--hid-t); font-size:14.5px; line-height:1.5; }
  body.light .haffix .hl{ color:#b07c20; } body.light .haffix .ht{ color:#6a5226; }
  .soul .sl{ color:var(--soul); font-size:14px; letter-spacing:.12em; margin-top:14px; display:block; }
  .soul .srd{ color:#f0c873; font-size:16px; font-weight:600; margin-top:6px; font-family:"Noto Serif JP",serif; }
  .soul .smean{ color:var(--hid-t); font-size:13.5px; margin:3px 0 8px; }
  body.light .soul .srd{ color:#a9781c; } body.light .soul .smean{ color:#6a5226; }
  .soul .zh{ color:#f0c873; font-size:18px; font-weight:600; margin:4px 0 2px; font-family:"Noto Serif SC",serif; text-shadow:0 0 10px rgba(224,166,75,.35); }
  .soul .src{ color:#8a7340; font-size:12px; } .soul .gl{ color:var(--hid-t); font-size:14px; font-style:italic; margin-top:3px; }
  body.light .soul .zh{ color:#a9781c; text-shadow:none; } body.light .soul .gl{ color:#6a5226; }

  /* lang switch */
  .lang{ display:flex; gap:6px; background:rgba(0,0,0,.4); border:1px solid #2c2118; border-radius:999px; padding:4px; }
  body.light .lang{ background:rgba(255,255,255,.5); border-color:#e0cd9a; }
  .lang button{ font-family:"Noto Serif JP",serif; font-size:13px; color:var(--mute); background:none; border:0;
    padding:6px 14px; border-radius:999px; cursor:pointer; }
  .lang button.on{ color:#f2e6cf; background:linear-gradient(180deg,#3a2613,#23160c); box-shadow:inset 0 0 0 1px #6b4e26; }
  body.light .lang button.on{ color:#5a4424; background:linear-gradient(180deg,#f1deb4,#e7cf9e); box-shadow:inset 0 0 0 1px #cbb073; }

  /* counters */
  .counter{ text-align:center; font-family:"Noto Serif JP",serif; }
  .counter .lab{ color:var(--mute); font-size:12.5px; letter-spacing:.14em; }
  .counter .num{ color:var(--uniq-l); font-size:30px; font-weight:600; letter-spacing:.02em; }
  .counter .num small{ font-size:15px; color:var(--uniq); margin-left:3px; }
  body.light .counter .lab{ color:#9a875f; } body.light .counter .num{ color:#b07c20; } body.light .counter .num small{ color:#bb8e2a; }

  /* achievement wall */
  .wall{ width:min(420px,94vw); display:flex; flex-direction:column; gap:9px; }
  .ach{ border:1px solid #322619; background:linear-gradient(180deg,#160f0a,#0e0907); border-radius:8px;
    padding:11px 13px; opacity:0; transform:translateY(8px); transition:opacity .5s, transform .5s, border-color .3s; }
  .ach.show{ opacity:1; transform:none; }
  .ach .at{ color:var(--uniq-l); font-size:14.5px; font-weight:600; font-family:"Noto Serif JP",serif; }
  .ach .asub{ color:var(--mute); font-size:11.5px; }
  .ach .ad{ color:#bdb6a8; font-size:13px; line-height:1.5; margin-top:3px; font-family:"Noto Serif JP",serif; }
  .ach.boss{ border-color:#5a3a20; box-shadow:0 0 14px rgba(175,96,37,.12) inset; cursor:pointer; }
  .ach.boss:hover{ border-color:var(--uniq); }
  .ach .ctr{ margin-top:7px; padding-top:7px; border-top:1px solid #2a2016; }
  .ach .ctr .lab{ color:var(--mute); font-size:11px; letter-spacing:.1em; }
  .ach .ctr .num{ color:#ff9a55; font-size:19px; font-weight:600; font-family:"Noto Serif JP",serif; }
  .ach .tap{ color:#7d6a45; font-size:11px; margin-top:5px; letter-spacing:.1em; }
  body.light .ach{ background:linear-gradient(180deg,#fffdf7,#f4ecdc); border-color:#e3d4ac; }
  body.light .ach .at{ color:#9c6a1e; } body.light .ach .asub{ color:#a08a5e; }
  body.light .ach .ad{ color:#6a5a3c; } body.light .ach .ctr .num{ color:#c2701a; }

  /* per-page achievement card */
  .acard{ width:min(440px,94vw); text-align:center; animation:fade .5s ease both; }
  .acap{ color:var(--hid-l); letter-spacing:.28em; font-size:12px; font-family:"Noto Serif JP",serif; }
  .acard.boss .acap{ color:#ff9a55; }
  .acard.final .acap{ color:#c2701a; }
  .acard.heart .acap{ color:#9aa6ff; }
  .arule{ width:120px; height:1px; margin:11px auto 16px; background:linear-gradient(90deg,transparent,var(--uniq),transparent); }
  .acard.final .arule{ background:linear-gradient(90deg,transparent,#c2701a,transparent); }
  .acard.heart .arule{ background:linear-gradient(90deg,transparent,#9aa6ff,transparent); }
  .acard .at{ color:var(--uniq-l); font-size:23px; font-weight:600; font-family:"Noto Serif JP",serif; line-height:1.3; }
  .acard.final .at{ color:#9c6a1e; }
  .acard .asub{ color:var(--mute); font-size:13px; margin-top:5px; }
  .acard .ad{ color:#cfc7b6; font-size:15px; line-height:1.75; margin:14px auto 0; max-width:400px; font-family:"Noto Serif JP",serif; }
  .acard.final .ad{ color:#6a5a3c; }
  .acard .bcounter{ margin-top:18px; }
  .maskbtn{ margin-top:18px; font-family:"Noto Serif JP",serif; font-size:14px; color:#cdbf9a;
    background:linear-gradient(180deg,#2c1c0e,#1a1009); border:1px solid #5a4326; border-radius:8px;
    padding:11px 22px; cursor:pointer; letter-spacing:.06em; }
  .maskbtn:hover{ color:#f2e6cf; box-shadow:0 0 16px var(--glow); }
  /* staggered card reveal (used for normal + boss + hidden-unlock achievement cards) */
  @keyframes bossFlash{ 0%,100%{opacity:1;} 50%{opacity:.3;} }
  .acard.boss .acap.flash{ animation:bossFlash .3s ease 3; }
  .acard .rv{ opacity:0; transform:translateY(9px); transition:opacity .75s ease, transform .75s ease; }
  .acard .rv.show{ opacity:1; transform:none; }
  /* result / verdict line — set apart from the main description */
  .acard .ad-tail{ display:block; margin-top:10px; color:var(--uniq-l); font-size:14.5px; line-height:1.6; font-family:"Noto Serif JP",serif; }
  /* status readout panel (counter + timekeeper button) — visually separated from the text above */
  .acard .statuspanel{ margin-top:24px; padding-top:18px; border-top:1px dashed rgba(232,178,58,.25); }
  .acard.boss .statuspanel{ border-top-color:rgba(255,154,85,.3); }
  .acard .statuspanel .bcounter{ margin-top:0; }
  .acard .statuspanel .maskbtn{ display:block; margin:18px auto 0; }
  /* category badge */
  .catbadge{ display:inline-block; font-size:11px; letter-spacing:.2em; padding:3px 13px; border-radius:999px; margin-bottom:12px; font-family:"Noto Serif JP",serif; }
  .catbadge.rec{ color:#e8b23a; border:1px solid #6b4e26; background:rgba(120,90,30,.16); }
  .catbadge.heart{ color:#9aa6ff; border:1px solid #3a3f6b; background:rgba(70,80,150,.16); }
  body.light .catbadge.rec{ color:#a9781c; border-color:#d8c08a; background:rgba(200,160,80,.14); }
  body.light .catbadge.heart{ color:#5b62c8; border-color:#bcc2ef; background:rgba(90,100,180,.10); }
  .wall .catbadge{ margin-bottom:0; margin-left:8px; padding:1px 9px; font-size:10px; vertical-align:1px; }
  /* per-page brand logo */
  .brandfix{ position:fixed; left:0; right:0; bottom:10px; text-align:center; z-index:5; pointer-events:none;
    color:#4f463a; font-size:10.5px; letter-spacing:.22em; font-family:"Cormorant Garamond",serif; opacity:.6; }
  body.light .brandfix{ color:#b3a489; }

  /* knot (long-press) */
  .knotwrap{ display:flex; flex-direction:column; align-items:center; gap:10px; }
  .hh{ color:#6f6453; font-size:13px; letter-spacing:.06em; font-family:"Noto Serif JP",serif; min-height:20px; }
  .holding .hh{ color:var(--hid-l); }
  .knot{ width:88px; height:88px; cursor:pointer; touch-action:none; }
  .knot svg{ width:100%; height:100%; }
  .knot .glyph{ fill:none; stroke:#6d4f28; stroke-width:2; stroke-linejoin:round; stroke-linecap:round; transition:stroke .2s; }
  .knot:hover .glyph{ stroke:#9c7636; }
  .knot .prog{ fill:none; stroke:var(--soul); stroke-width:2.6; stroke-linecap:round; stroke-linejoin:round; filter:drop-shadow(0 0 5px var(--glow)); }
  .knot .ctrk{ fill:none; stroke:#6d4f28; stroke-width:1.4; } .knot:hover .ctrk{ stroke:#9c7636; }
  .knot .bead{ fill:var(--uniq); }

  .affixlist{ width:min(400px,94vw); }
  .affixlist .ln{ opacity:0; transform:translateY(6px); transition:opacity .5s, transform .5s; margin:8px 0; text-align:center; }
  .affixlist .ln.show{ opacity:1; transform:none; }

  /* invite */
  .invite{ width:min(380px,94vw); border:1px solid var(--frame); border-radius:10px;
    background:linear-gradient(180deg,var(--tt-top),var(--tt-bot)); padding:22px 20px; text-align:center;
    box-shadow:0 0 24px var(--glow); }
  .invite h2{ color:var(--uniq-l); font-size:19px; letter-spacing:.1em; font-family:"Noto Serif JP",serif; margin-bottom:14px; }
  .invite .meta{ color:var(--txt); font-size:14px; line-height:1.9; font-family:"Noto Serif JP",serif; }
  .invite .meta b{ color:var(--uniq); font-weight:500; }
  .invite .btns{ margin-top:18px; display:flex; gap:12px; justify-content:center; align-items:center; position:relative; }
  .deny{ font-family:"Noto Serif JP",serif; font-size:14px; color:#6a6256; background:none; border:1px solid #322619;
    border-radius:8px; padding:13px 20px; cursor:pointer; transition:transform .2s; }

  /* finale text */
  .finale-text{ font-family:"Noto Serif JP",serif; text-align:center; line-height:2.05; font-size:16px;
    color:#5a4a30; max-width:560px; }
  .finale-text .em{ color:#9c6a1e; }
  .clearbox{ font-family:"Noto Serif JP",serif; white-space:pre-wrap; text-align:center; line-height:1.9;
    color:#5a4a30; border-top:1px solid #d8c08a; border-bottom:1px solid #d8c08a; padding:16px 10px; font-size:15px; max-width:380px; }
  .clearbox .ti{ color:#9c6a1e; font-size:18px; font-weight:600; }
  .clearbox .rw{ color:#7a5e2e; }

  /* npc overlay */
  .overlay{ position:fixed; inset:0; z-index:40; background:rgba(6,5,4,.92); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; padding:26px; }
  .overlay.on{ display:flex; animation:fade .5s ease both; }
  .npc{ max-width:520px; text-align:center; }
  .npc .who{ color:var(--soul); letter-spacing:.2em; font-size:13px; font-family:"Noto Serif JP",serif; margin-bottom:14px; }
  .npc .line{ color:#e7d9bd; font-size:16px; line-height:2; font-family:"Noto Serif JP",serif; white-space:pre-wrap; }
  .npc .line .d{ color:#ff9a55; font-weight:600; }
</style>
</head>
<body>

<button class="skip" id="skipBtn" onclick="goCodex()" style="display:none;">スキップ ▸</button>

<!-- 0. intro -->
<section class="screen on" id="s-intro">
  <div class="center">
    <div class="sys" id="introMsg1">. . . 未知のエネルギーを検知 . . .</div>
    <div class="sys" style="margin-top:6px;"><b id="introMsg2">未鑑定のユニークアイテム</b></div>
  </div>
  <button class="btn glow" id="scanBtn" onclick="startScan()">鑑定する</button>
</section>

<!-- loading -->
<section class="screen" id="s-load">
  <div class="sys center" id="loadText"></div>
</section>

<!-- 1. item -->
<section class="screen" id="s-item">
  <div class="lang" id="lang">
    <button data-l="ja" class="on">日本語</button><button data-l="zh">中文</button><button data-l="en">EN</button>
  </div>
  <div class="tooltip" id="itemTip"></div>
  <button class="next" id="itemNext" onclick="startStory();">▸ 続ける</button>
</section>

<!-- 2. achievements: one per page -->
<section class="screen tall" id="s-story">
  <div class="acard" id="storyCard"></div>
  <button class="next" id="storyNext" onclick="storyNext()">▸ 続ける</button>
</section>

<!-- 3. deep ident / hidden affixes -->
<section class="screen tall" id="s-affix">
  <div class="sys center" id="affixIntro">このアイテムには未公開のモッドが眠っている。</div>
  <div class="knotwrap" id="knotwrap">
    <div class="hh" id="hh">飾り紐の紋様を長押しして解読</div>
    <div class="knot" id="knot" role="button" tabindex="0" aria-label="hold">
      <svg viewBox="0 0 60 60" aria-hidden="true">
        <path class="glyph" d="M30 30 C30 18 12 18 12 30 C12 42 30 42 30 30 C30 18 48 18 48 30 C48 42 30 42 30 30 M30 30 C18 30 18 12 30 12 C42 12 42 30 30 30 C18 30 18 48 30 48 C42 48 42 30 30 30"/>
        <path class="prog" d="M30 30 C30 18 12 18 12 30 C12 42 30 42 30 30 C30 18 48 18 48 30 C48 42 30 42 30 30 M30 30 C18 30 18 12 30 12 C42 12 42 30 30 30 C18 30 18 48 30 48 C42 48 42 30 30 30"/>
        <rect class="ctrk" x="25.5" y="25.5" width="9" height="9" transform="rotate(45 30 30)"/>
        <circle class="bead" cx="30" cy="9" r="1.5"/><circle class="bead" cx="30" cy="51" r="1.5"/>
        <circle class="bead" cx="9" cy="30" r="1.5"/><circle class="bead" cx="51" cy="30" r="1.5"/>
      </svg>
    </div>
  </div>
  <div class="affixlist" id="affixlist"></div>

var SEP='<div class="sep"><i></i></div>';
function ttHTML(d, ring, unlocked){
  var h='<div class="icon-wrap"><div class="icon"><img src="'+ring+'" alt=""></div></div>';
  h+='<div class="head"><div class="titlerow">'+volSVG('l')+'<div class="titlecol"><div class="name">'+d.name+'</div><div class="base">'+d.base+'</div></div>'+volSVG('r')+'</div></div>';
  h+='<div class="ttbody"><div class="req">'+d.req+'</div>';
  h+=SEP+'<div class="row implicit mod">'+d.implicit+'</div>';
  h+=SEP+'<div class="stack">'+d.mods.map(function(m){return '<div class="row mod'+(m[1]?' '+m[1]:'')+'">'+m[0]+'</div>';}).join('')+'</div>';
  h+=SEP+'<div class="flavor">'+d.flavor+'</div>';
  if(unlocked){
    h+=SEP+'<div>'+d.affixes.map(function(a){return '<div class="haffix"><div class="hl">'+a[0]+'</div><div class="ht">'+a[1]+'</div></div>';}).join('');
    var s=d.soul;
    h+='<div class="haffix soul"><div class="sl">'+s.label+'</div>'+(s.read?'<div class="srd">'+s.read+'</div>':'')+'<div class="smean">'+s.mean+'</div><div class="zh">'+s.zh+'</div><div class="gl">'+s.gloss+'</div><div class="src">'+s.src+'</div></div></div>';
  }
  h+='</div>';
  return h;
}
function volSVG(side){
  return '<svg class="vol '+side+'" viewBox="0 0 48 30" aria-hidden="true"><path d="M47 15 C40 15 34 16 29 15 C24 14 22 9 17 9"/><path d="M29 15 C26 20 23 22 20 20"/><circle cx="13" cy="9" r="5"/><circle cx="9" cy="18.5" r="4"/><circle cx="20.5" cy="20.5" r="3.4"/><path class="hi" d="M47 15 C40 15 34 16 29 15"/><circle class="dot" cx="25" cy="15" r="1.6"/></svg>';
}

function startStory(){ sp=0; renderStory(); show('s-story'); }
function staggerReveal(card, selectors, startDelay, gap){
  var els=selectors.map(function(s){ return card.querySelector(s); }).filter(Boolean);
  els.forEach(function(el){ el.classList.add('rv'); });
  els.forEach(function(el,i){ setTimeout(function(){ el.classList.add('show'); }, startDelay+i*gap); });
  return startDelay+els.length*gap;
}
function renderStory(){
  var idx=STORY[sp], a=ACH[idx];
  var card=document.getElementById('storyCard'), next=document.getElementById('storyNext');
  card.className='acard'+(a.boss?' boss':'')+(a.cat?' '+a.cat:'');
  card.style.transition='opacity .5s ease'; card.style.opacity='1';
  if(a.hidden){
    card.innerHTML='<div class="acap">'+cap(idx)+'</div><div class="arule"></div><div class="at">'+UItxt('masked')+'</div><div class="ad" style="color:#6a6256;">'+UItxt('maskedSub')+'</div>';
    next.style.visibility='hidden';
    setTimeout(function(){
      card.style.opacity='0';
      setTimeout(function(){
        card.innerHTML=acardHTML(idx); card.style.opacity='1'; next.style.visibility='visible';
        staggerReveal(card, ['.at','.ad'], 120, 430);
      }, 520);
    }, 1150);
  }else if(a.boss){
    card.innerHTML=acardHTML(idx);
    next.style.visibility='hidden';
    var capEl=card.querySelector('.acap'); if(capEl) capEl.classList.add('flash');
    var t=staggerReveal(card, ['.catbadge','.at','.asub','.ad','.ad-tail','.statuspanel'], 600, 460);
    setTimeout(function(){ next.style.visibility='visible'; }, t+300);
  }else{
    card.innerHTML=acardHTML(idx);
    next.style.visibility='hidden';
    var t2=staggerReveal(card, ['.catbadge','.at','.asub','.ad','.ad-tail','.statuspanel'], 120, 430);
    setTimeout(function(){ next.style.visibility='visible'; }, t2+200);
  }
  window.scrollTo(0,0);
}
function storyNext(){ sp++; if(sp>=STORY.length){ show('s-affix'); } else { renderStory(); } }

/* knot long-press */
var LEN, raf=null, t0=0, revealed=false;
function initKnot(){
  var prog=document.querySelector('#knot .prog'); LEN=prog.getTotalLength();
  prog.style.strokeDasharray=LEN; prog.style.strokeDashoffset=LEN;
}
function frame(ts){ if(!t0)t0=ts; var p=Math.min((ts-t0)/1500,1);
  document.querySelector('#knot .prog').style.strokeDashoffset=LEN*(1-p);
  if(p>=1){ doReveal(); return; } raf=requestAnimationFrame(frame); }
function startHold(e){ if(revealed)return; e.preventDefault();
  document.getElementById('knotwrap').classList.add('holding'); document.getElementById('hh').textContent=UItxt('hhHolding'); t0=0; raf=requestAnimationFrame(frame); }
function cancelHold(){ if(revealed)return; if(raf)cancelAnimationFrame(raf); raf=null;
  document.getElementById('knotwrap').classList.remove('holding'); document.getElementById('hh').textContent=UItxt('hhDefault');
  document.querySelector('#knot .prog').style.strokeDashoffset=LEN; }
function doReveal(){ revealed=true; if(raf)cancelAnimationFrame(raf);
  document.getElementById('knot').style.display='none'; document.getElementById('hh').textContent=UItxt('hhDone');
  var d=item[curLang], list=document.getElementById('affixlist'), html='';
  d.affixes.forEach(function(a){ html+='<div class="ln"><div class="haffix"><div class="hl">'+a[0]+'</div><div class="ht">'+a[1]+'</div></div></div>'; });
  var s=d.soul; html+='<div class="ln"><div class="haffix soul"><div class="sl">'+s.label+'</div>'+(s.read?'<div class="srd">'+s.read+'</div>':'')+'<div class="smean">'+s.mean+'</div><div class="zh">'+s.zh+'</div><div class="gl">'+s.gloss+'</div><div class="src">'+s.src+'</div></div></div>';
  list.innerHTML=html;
  var lns=list.querySelectorAll('.ln');
  lns.forEach(function(el,i){ setTimeout(function(){ el.classList.add('show'); if(i===lns.length-1) document.getElementById('affixNext').style.visibility='visible'; }, 250+i*460); });
}

  var pc=document.getElementById('permCounter');
  pc.innerHTML='<div class="lab">'+UItxt('perm_label')+'</div><div class="num">Day '+permDays()+'</div>';
  pc.style.display='none';
  document.getElementById('confirmNext').style.visibility='hidden';
  setTimeout(function(){ pc.style.display='block'; }, 1600);
  setTimeout(function(){ document.getElementById('confirmNext').style.visibility='visible'; }, 2600);
}
/* confirmNext → final achievement 同袍 */
function gotoFinalAch(){
  document.getElementById('finalCard').innerHTML=acardHTML(10);
  show('s-finalach');
  document.getElementById('finalNext').style.visibility='hidden';
  setTimeout(function(){ document.getElementById('finalNext').style.visibility='visible'; }, 1800);
}
/* finalNext → clear / reward */
function gotoClear(){
  document.getElementById('clearBox').innerHTML='<div class="ti">'+UItxt('questClear')+'</div>\n\n'+UItxt('rewardLabel')+'\n<span class="rw">'+UItxt('rewardRing')+'</span>\n<span class="rw">'+UItxt('rewardMember')+'</span>\n\n'+UItxt('titleLabel');
  show('s-clear');
  document.getElementById('openBtn').style.display='none';
  setTimeout(function(){ document.getElementById('openBtn').style.display='block'; }, 1600);
}

/* codex */
function renderCodexPage(){
  renderCodexTip();
  document.getElementById('cTogether').innerHTML='<div class="lab">'+UItxt('together_label')+'</div><div class="num">'+togetherDays()+'<small>'+(curLang==='zh'?'天':curLang==='en'?' days':'日')+'</small></div>';
  document.getElementById('cPerm').innerHTML='<div class="lab">'+UItxt('perm_label')+'</div><div class="num">Day '+permDays()+'</div>';
  document.getElementById('achCount').textContent=UItxt('ach_count');
  document.getElementById('replayBtn').textContent=UItxt('replay');
  buildWall(document.getElementById('wall2'));
}
function goCodex(){
  document.body.classList.add('light');
  renderCodexPage();
  show('s-codex');
}
function replay(){ document.body.classList.remove('light'); revealed=false; curLang='ja'; sp=0;
  document.querySelectorAll('#lang button, #lang2 button').forEach(function(x){ x.classList.toggle('on', x.dataset.l==='ja'); });
  document.getElementById('knot').style.display=''; document.getElementById('affixlist').innerHTML='';
  document.getElementById('affixNext').style.visibility='hidden';
  applyFlowLanguage();
  cancelHold(); renderItem(); show('s-intro'); }

/* live tick */
setInterval(function(){
  document.querySelectorAll('.cnt-together').forEach(function(e){ e.textContent=togetherDays()+(curLang==='zh'?' 天':curLang==='en'?' days':' 日'); });
}, 60000);

/* init */
window.addEventListener('load', function(){
  initKnot();
  applyFlowLanguage();
  var k=document.getElementById('knot');
  k.addEventListener('pointerdown',startHold); k.addEventListener('pointerup',cancelHold);
  k.addEventListener('pointerleave',cancelHold); k.addEventListener('pointercancel',cancelHold);
  k.addEventListener('contextmenu',function(e){e.preventDefault();});
  k.addEventListener('keydown',function(e){ if((e.key==='Enter'||e.key===' ')&&!revealed){ e.preventDefault(); doReveal(); }});
  setupDeny();
});
</script>

<div class="overlay" id="overlay">
  <div class="npc">
    <div class="who" id="npcWho">〔 時の観測者 〕</div>
    <div class="line" id="npcLine"></div>
    <button class="next" id="npcClose" onclick="closeNPC()" style="margin-top:22px;">▸ 閉じる</button>
  </div>
</div>
